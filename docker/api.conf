# Обработка API запросов через api.php
<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Перенаправление API запросов на api.php
Alias /api/v1 /var/www/html/api.php

<Directory /var/www/html>
    RewriteEngine On
    # API запросы обрабатываются через api.php
    RewriteRule ^api/v1.*$ api.php [L,QSA]
    # Все остальные запросы - статические файлы или index.php
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ index.php [L]
</Directory>
