<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # Проксируем API запросы к Go-бэкенду
    ProxyPreserveHost On
    ProxyPass /api/ http://go-api:8081/api/
    ProxyPassReverse /api/ http://go-api:8081/api/

    # Проксируем /healthz
    ProxyPass /healthz http://go-api:8081/healthz
    ProxyPassReverse /healthz http://go-api:8081/healthz
</VirtualHost>
