<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass /api/ http://go-api:8081/api/
    ProxyPassReverse /api/ http://go-api:8081/api/
    ProxyPass /healthz http://go-api:8081/healthz
    ProxyPassReverse /healthz http://go-api:8081/healthz

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
