services:
  postgres:
    image: postgres:16-alpine
    container_name: votely-postgres
    environment:
      POSTGRES_DB: votely
      POSTGRES_USER: votely
      POSTGRES_PASSWORD: votely
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votely -d votely"]
      interval: 5s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: votely-php
    volumes:
      - ./web:/var/www/html
    ports:
      - "8000:80"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: votely
      PG_USER: votely
      PG_PASSWORD: votely
      HASH_SECRET: your-super-secret-key-min-32-chars
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
