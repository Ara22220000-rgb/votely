services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      go-api:
        condition: service_started
    restart: unless-stopped
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=votely
      - PG_USER=votely
      - PG_PASSWORD=votely
      - HASH_SECRET=${HASH_SECRET:-dev-secret-key-for-local-development-only}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - GO_API_URL=http://go-api:8081

  go-api:
    build:
      context: .
      dockerfile: Dockerfile.go.bak
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=votely
      - PG_USER=votely
      - PG_PASSWORD=votely
      - HASH_SECRET=${HASH_SECRET:-dev-secret-key-for-local-development-only}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - APP_ADDR=:8081
      - MIGRATIONS_DIR=/migrations
      - LOG_LEVEL=debug
    expose:
      - "8081"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: votely
      POSTGRES_USER: votely
      POSTGRES_PASSWORD: votely
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votely -d votely"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
